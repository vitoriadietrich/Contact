<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#a9c4c6;
}

.container{
    background:#fff;
    width:800px;
    padding:30px;
    border-radius:8px;
    display:flex;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* LEFT SIDE */
.left{
    width:35%;
    text-align:center;
    padding-right:20px;
    border-right:1px solid #ccc;
}

.left .box{
    margin-bottom:25px;
}

.left i{
    font-size:22px;
    color:#6a0dad;
    margin-bottom:8px;
}

.left h4{
    font-size:16px;
    margin-bottom:5px;
}

.left p{
    font-size:13px;
    color:#777;
}

/* RIGHT SIDE */
.right{
    width:65%;
    padding-left:25px;
}

.right h2{
    color:#6a0dad;
    margin-bottom:10px;
}

.right p{
    font-size:13px;
    color:#777;
    margin-bottom:15px;
}

.input-box{
    margin-bottom:10px;
}

.input-box input,
.input-box textarea{
    width:100%;
    border:none;
    outline:none;
    background:#f1f1f5;
    padding:12px;
    border-radius:4px;
    font-size:13px;
}

textarea{
    resize:none;
    height:100px;
}

.btn{
    margin-top:10px;
    background:#6a0dad;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:4px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="box">
            <i class="fa fa-location-dot"></i>
            <h4>Address</h4>
            <p>Surkhet, NP12<br>Birendranagar 06</p>
        </div>

        <div class="box">
            <i class="fa fa-phone"></i>
            <h4>Phone</h4>
            <p>+0068 9823 5343<br>+0098 2323 5343</p>
        </div>

        <div class="box">
            <i class="fa fa-envelope"></i>
            <h4>Email</h4>
            <p>codinglab@gmail.com<br>info.codinglab@gmail.com</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>Send us a message</h2>
        <p>
            If you have any work from me or any types of queries related to my tutorial,
            you can send me message from here. It's my pleasure to help you.
        </p>

        <div class="input-box">
            <input type="text" placeholder="Enter your name">
        </div>

        <div class="input-box">
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="input-box">
            <textarea placeholder="Enter your message"></textarea>
        </div>

        <button class="btn">Send Now</button>
    </div>

</div>

</body>
</html>
